name: Secret Demo

on:
  push:
    branches: [ "main" ]

jobs:
  secret-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Testar Secret
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          if [ -n "$API_KEY" ]; then
            echo "API_KEY configurado"
          else
            echo "API_KEY vazio"
            exit 1
          fi