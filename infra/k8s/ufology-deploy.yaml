apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufology-deploy
  namespace: ufology
  labels:
    app: ufology-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ufology
  template:
    metadata:
      name: ufology-deploy
      labels:
        app: ufology
    spec:
      restartPolicy: Always
      containers:
        - name: ufology-deploy
          image: airtonoliveira26/ufotracker-app:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-secret
